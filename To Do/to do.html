<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Task | Modern Todo App</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS Link -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <!-- Header Section -->
        <header>
            <div class="header-content">
                <h1>Smart Task</h1>
                <p id="date-display">Loading date...</p>
            </div>
            <button id="theme-toggle" class="theme-btn" aria-label="Toggle Dark Mode">
                <i class="fas fa-moon"></i>
            </button>
        </header>

        <!-- Input Section -->
        <div class="input-group">
            <input type="text" id="task-input" placeholder="What needs to be done?" autocomplete="off">
            <button id="add-btn" class="add-btn">
                <i class="fas fa-plus"></i>
            </button>
        </div>

        <!-- Filter Section -->
        <div class="filter-container">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="pending">Pending</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
        </div>

        <!-- Task List -->
        <ul id="task-list" class="task-list">
            <!-- Tasks will be injected here via JS -->
        </ul>
        
        <!-- Empty State (Hidden by default) -->
        <div id="empty-state" class="empty-state hidden">
            <i class="fas fa-clipboard-check"></i>
            <p>No tasks found. Enjoy your day!</p>
        </div>
    </div>

    <!-- Edit Modal (Hidden by default) -->
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <h3>Edit Task</h3>
            <input type="text" id="edit-input" placeholder="Update task...">
            <div class="modal-actions">
                <button id="save-edit-btn" class="save-btn">Save</button>
                <button id="cancel-edit-btn" class="cancel-btn">Cancel</button>
            </div>
        </div>
    </div>

    <!-- JS Link -->
    <script src="script.js">document.addEventListener('DOMContentLoaded', () => {
    // DOM Elements
    const taskInput = document.getElementById('task-input');
    const addBtn = document.getElementById('add-btn');
    const taskList = document.getElementById('task-list');
    const filterBtns = document.querySelectorAll('.filter-btn');
    const themeToggle = document.getElementById('theme-toggle');
    const dateDisplay = document.getElementById('date-display');
    const emptyState = document.getElementById('empty-state');
    
    // Modal Elements
    const editModal = document.getElementById('edit-modal');
    const editInput = document.getElementById('edit-input');
    const saveEditBtn = document.getElementById('save-edit-btn');
    const cancelEditBtn = document.getElementById('cancel-edit-btn');

    // State
    let tasks = JSON.parse(localStorage.getItem('smartTasks')) || [];
    let currentFilter = 'all';
    let editingId = null;

    // --- Initialization ---
    renderTasks();
    updateDate();
    loadTheme();

    // --- Event Listeners ---
    
    // Add Task
    addBtn.addEventListener('click', addTask);
    taskInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') addTask();
    });

    // Theme Toggle
    themeToggle.addEventListener('click', toggleTheme);

    // Filter Buttons
    filterBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            filterBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.dataset.filter;
            renderTasks();
        });
    });

    // Modal Actions
    saveEditBtn.addEventListener('click', () => {
        if (editInput.value.trim() !== '') {
            updateTask(editingId, editInput.value.trim());
        }
        closeModal();
    });

    cancelEditBtn.addEventListener('click', closeModal);
    
    // Close modal on outside click
    editModal.addEventListener('click', (e) => {
        if (e.target === editModal) closeModal();
    });

    // --- Core Functions ---

    function addTask() {
        const text = taskInput.value.trim();
        if (text === '') return;

        const newTask = {
            id: Date.now(),
            text: text,
            completed: false
        };

        tasks.push(newTask);
        saveToLocalStorage();
        renderTasks();
        taskInput.value = '';
        taskInput.focus();
    }

    function deleteTask(id) {
        const taskElement = document.querySelector(`[data-id="${id}"]`);
        
        // Add animation class before removing
        if (taskElement) {
            taskElement.classList.add('removing');
            taskElement.addEventListener('animationend', () => {
                tasks = tasks.filter(task => task.id !== id);
                saveToLocalStorage();
                renderTasks();
            });
        } else {
            // Fallback if animation element not found
            tasks = tasks.filter(task => task.id !== id);
            saveToLocalStorage();
            renderTasks();
        }
    }

    function toggleComplete(id) {
        tasks = tasks.map(task => {
            if (task.id === id) {
                return { ...task, completed: !task.completed };
            }
            return task;
        });
        saveToLocalStorage();
        renderTasks();
    }

    function editTask(id) {
        const task = tasks.find(t => t.id === id);
        if (task) {
            editingId = id;
            editInput.value = task.text;
            editModal.classList.add('active');
            editInput.focus();
        }
    }

    function updateTask(id, newText) {
        tasks = tasks.map(task => {
            if (task.id === id) {
                return { ...task, text: newText };
            }
            return task;
        });
        saveToLocalStorage();
        renderTasks();
    }

    function closeModal() {
        editModal.classList.remove('active');
        editingId = null;
        editInput.value = '';
    }

    function saveToLocalStorage() {
        localStorage.setItem('smartTasks', JSON.stringify(tasks));
    }

    function updateDate() {
        const options = { weekday: 'long', month: 'long', day: 'numeric' };
        const today = new Date();
        dateDisplay.textContent = today.toLocaleDateString('en-US', options);
    }

    function loadTheme() {
        const isDark = localStorage.getItem('theme') === 'dark';
        if (isDark) {
            document.body.classList.add('dark-mode');
            themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
        } else {
            document.body.classList.remove('dark-mode');
            themeToggle.innerHTML = '<i class="fas fa-moon"></i>';
        }
    }

    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        themeToggle.innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
    }

    function renderTasks() {
        taskList.innerHTML = '';
        
        // Filter tasks
        let filteredTasks = tasks;
        if (currentFilter === 'pending') {
            filteredTasks = tasks.filter(task => !task.completed);
        } else if (currentFilter === 'completed') {
            filteredTasks = tasks.filter(task => task.completed);
        }

        // Toggle Empty State
        if (filteredTasks.length === 0) {
            emptyState.classList.remove('hidden');
        } else {
            emptyState.classList.add('hidden');
        }

        // Create HTML for each task
        filteredTasks.forEach(task => {
            const li = document.createElement('li');
            li.className = `task-item ${task.completed ? 'completed' : ''}`;
            li.setAttribute('data-id', task.id);

            li.innerHTML = `
                <div class="task-content" onclick="toggleComplete(${task.id})">
                    <div class="custom-checkbox"></div>
                    <span class="task-text">${escapeHtml(task.text)}</span>
                </div>
                <div class="task-actions">
                    <button class="action-btn edit-btn" onclick="editTask(${task.id})" title="Edit">
                        <i class="fas fa-pen"></i>
                    </button>
                    <button class="action-btn delete-btn" onclick="deleteTask(${task.id})" title="Delete">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            `;

            taskList.appendChild(li);
        });
    }

    // Helper to prevent XSS
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
});</script>
</body>
</html>
